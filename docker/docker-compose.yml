services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: appuser #hardcoded for now
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - db-data:/var/lib/postgresql/data #volume for persistence over lifecycles
    ports:
      - "5430:5432"

volumes:
  db-data:
